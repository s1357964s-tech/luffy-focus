name: luffy_focus
description: A minimalist Pomodoro app featuring Luffy the Shiba Inu.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.3
  image_picker: ^1.2.2
  home_widget: ^0.9.1
  firebase_core: ^4.9.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.3.1
  firebase_storage: ^13.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/luffy_awake.png
    - assets/images/luffy_sleeping.png
    - assets/images/luffy_happy.png
    - assets/images/luffy_interrupted.png
    - assets/images/mock/mock_cat_normal.png
    - assets/images/mock/mock_cat_sleeping.png
    - assets/images/mock/mock_cat_failed.png
